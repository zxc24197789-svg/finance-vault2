<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="財庫" />
  <meta name="theme-color" content="#0f0f14" />
  <title>財庫 — 個人記帳 Pro</title>
  <link rel="apple-touch-icon" href="https://fav.farm/💰" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body { background: #0f0f14; -webkit-font-smoothing: antialiased; user-select: none; -webkit-user-select: none; overscroll-behavior-y: none; font-family: 'Fredoka', 'Noto Serif TC', serif; color: #e8e6f0; }
    input, select, textarea { user-select: auto; -webkit-user-select: auto; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const STORAGE_KEY = "finance_tracker_pro_v2"; 
    const CHART_COLORS = ["#ff453a", "#ff9f0a", "#ffd60a", "#30d158", "#66d4cf", "#0a84ff", "#5e5ce6", "#bf5af2", "#ff375f"];

    const expenseCategories = ["飲食", "交通", "購物", "娛樂", "居家", "醫療", "卡費", "進修", "其他"];
    const incomeCategories = ["薪水", "獎金", "投資收益", "利息", "兼職", "退款", "其他"];

    function generateId() { return Math.random().toString(36).substr(2, 9); }
    function formatCurrency(n) { return "NT$ " + Number(n || 0).toLocaleString("zh-TW"); }
    function getMonthKey(date) { const d = new Date(date); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }
    function getQuarterKey(date) { const d = new Date(date); return `${d.getFullYear()}-Q${Math.floor(d.getMonth() / 3) + 1}`; }
    function getYearKey(date) { return `${new Date(date).getFullYear()}`; }

    function FinanceTracker() {
      const [data, setData] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            if (!parsed.creditCards) parsed.creditCards = [];
            if (!parsed.settings) parsed.settings = { passcode: "", reminder: "" };
            if (!parsed.templates) parsed.templates = [];
            if (!parsed.allTags) parsed.allTags = ["日常", "必要", "衝動消費", "約會", "旅行"];
            return parsed;
          }
        } catch {}
        
        return { 
          accounts: [
            { id: "daily", name: "日常生活", icon: "🛒", color: "#4ade80", balance: 0 },
            { id: "future", name: "救命錢 (備用金)", icon: "💰", color: "#f59e0b", balance: 0 }
          ], 
          creditCards: [], 
          transactions: [], 
          fixedExpenses: [],
          templates: [],
          allTags: ["日常", "必要", "衝動消費", "約會", "旅行"],
          settings: { passcode: "", reminder: "20:00" }
        };
      });

      const [tab, setTab] = useState("overview");
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({});
      const [showSplash, setSplash] = useState(true);
      const [splashFading, setSplashFading] = useState(false);
      const [calMonth, setCalMonth] = useState(() => { const n = new Date(); return { y: n.getFullYear(), m: n.getMonth() }; });
      const [showCal, setShowCal] = useState(false);
      
      const [editTx, setEditTx] = useState(null);
      const [editFixed, setEditFixed] = useState(null);
      const [editAccount, setEditAccount] = useState(null);
      const [editCard, setEditCard] = useState(null);
      
      const [expandedAccount, setExpandedAccount] = useState(null); 
      const [expandedCard, setExpandedCard] = useState(null); 
      
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [isUnlocked, setIsUnlocked] = useState(!data.settings.passcode);
      const [inputPin, setInputPin] = useState("");

      // ★ 返回導航映射 ★
      const backMap = { manage_accounts: "settings", manage_cards: "settings", manage_fixed: "settings", manage_templates: "settings", manage_tags: "settings", analytics: "overview", settings: "overview" };
      const overviewTabs = ["overview", "transactions"];
      const [slideDir, setSlideDir] = useState("fade");
      const [animKey, setAnimKey] = useState(0);

      const navigateTo = (newTab, dir) => {
        setSlideDir(dir || "fade");
        setAnimKey(k => k + 1);
        setTab(newTab);
      };
      const animClass = slideDir === "right" ? "slide-in-right" : slideDir === "left" ? "slide-in-left" : "fade-in";

      const [timeFilter, setTimeFilter] = useState(getMonthKey(new Date()));
      const [sourceFilter, setSourceFilter] = useState("all"); 
      const [searchQuery, setSearchQuery] = useState("");
      const [categoryFilter, setCategoryFilter] = useState("all");
      const [tagFilter, setTagFilter] = useState("all");

      const touchStartX = useRef(null);
      const touchStartY = useRef(null);
      const touchEndX = useRef(null);
      const touchEndY = useRef(null);

      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }, [data]);
      useEffect(() => {
        const t1 = setTimeout(() => setSplashFading(true), 1600);
        const t2 = setTimeout(() => setSplash(false), 2200);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);
      // ★ 鎖定背景滾動 ★
      useEffect(() => {
        if (isMenuOpen || modal) {
          document.body.style.overflow = "hidden";
          document.body.style.position = "fixed";
          document.body.style.width = "100%";
          document.body.style.top = `-${window.scrollY}px`;
        } else {
          const scrollY = document.body.style.top;
          document.body.style.overflow = "";
          document.body.style.position = "";
          document.body.style.width = "";
          document.body.style.top = "";
          window.scrollTo(0, parseInt(scrollY || "0") * -1);
        }
      }, [isMenuOpen, modal]);
      const save = (updates) => setData((d) => ({ ...d, ...updates }));

      const getTxSourceType = (accountId) => {
        if (data.creditCards.some(c => c.id === accountId)) return 'credit';
        return 'cash';
      };

      // ★ 修正：確保真實當前月份永遠存在，避免滑回不去 ★
      const dateOptions = useMemo(() => {
        const months = new Set(), quarters = new Set(), years = new Set();
        
        // 1. 強制加入當前真實世界的時間
        const now = new Date();
        months.add(getMonthKey(now));
        quarters.add(getQuarterKey(now));
        years.add(getYearKey(now));
        
        // 2. 加入所有有交易紀錄的時間
        data.transactions.forEach(t => {
          const d = new Date(t.date);
          months.add(getMonthKey(d));
          quarters.add(getQuarterKey(d));
          years.add(getYearKey(d));
        });
        
        // 確保陣列由新到舊排序 (例如: ['2026-04', '2026-03', '2026-02'])
        return {
          months: [...months].sort().reverse(),
          quarters: [...quarters].sort().reverse(),
          years: [...years].sort().reverse()
        };
      }, [data.transactions]);

      const filteredTxs = useMemo(() => {
        return data.transactions.filter(t => {
          if (timeFilter.includes('Q')) return getQuarterKey(t.date) === timeFilter;
          if (timeFilter.length === 4) return getYearKey(t.date) === timeFilter;
          return getMonthKey(t.date) === timeFilter;
        });
      }, [data.transactions, timeFilter]);

      const chartTxs = useMemo(() => {
        return filteredTxs.filter(t => {
          if (t.type !== 'expense') return false;
          if (sourceFilter === 'all') return true;
          return getTxSourceType(t.accountId) === sourceFilter;
        });
      }, [filteredTxs, sourceFilter, data.creditCards]);

      const totalIncome = filteredTxs.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
      const totalExpense = filteredTxs.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
      
      let fixedMultiplier = 1;
      if (timeFilter.includes('Q')) fixedMultiplier = 3;
      if (timeFilter.length === 4) fixedMultiplier = 12;
      const totalFixed = data.fixedExpenses.filter(f => f.active).reduce((s, f) => s + f.amount * fixedMultiplier, 0);
      
      const netBalance = totalIncome - totalExpense - totalFixed;

      const getAccountBalance = (accId) => data.transactions.filter((t) => t.accountId === accId).reduce((s, t) => s + (t.type === "income" ? t.amount : -t.amount), 0);

      const creditSummary = useMemo(() => {
        let totalLimit = 0;
        let totalUsed = 0;
        data.creditCards.forEach(card => {
          totalLimit += card.limit;
          const cardUsed = filteredTxs.filter(t => t.type === "expense" && t.accountId === card.id).reduce((s, t) => s + t.amount, 0);
          totalUsed += cardUsed;
        });
        const pct = totalLimit > 0 ? (totalUsed / totalLimit) * 100 : 0;
        const color = pct >= 80 ? "#ff453a" : pct >= 60 ? "#ff9f0a" : "#0a84ff"; 
        return { totalLimit, totalUsed, pct, color };
      }, [data.creditCards, filteredTxs]);

      const chartData = useMemo(() => {
        const catSum = {};
        chartTxs.forEach(t => { catSum[t.category] = (catSum[t.category] || 0) + t.amount; });
        
        if (totalFixed > 0 && (sourceFilter === 'all' || sourceFilter === 'cash')) {
          catSum["固定支出"] = totalFixed;
        }

        const totalChartExpense = Object.values(catSum).reduce((a, b) => a + b, 0);
        const sortedList = Object.entries(catSum)
          .map(([name, amount]) => ({ name, amount }))
          .sort((a, b) => b.amount - a.amount)
          .map((item, index) => ({
            ...item, color: CHART_COLORS[index % CHART_COLORS.length], percent: totalChartExpense === 0 ? 0 : Math.round((item.amount / totalChartExpense) * 100)
          }));

        let conicString = totalChartExpense === 0 ? "#2a2a3e 0% 100%" : "";
        if (totalChartExpense > 0) {
          let currentPercent = 0;
          conicString = sortedList.map(item => {
            const start = currentPercent;
            const end = currentPercent + (item.amount / totalChartExpense * 100);
            currentPercent = end;
            return `${item.color} ${start}% ${end}%`;
          }).join(", ");
        }
        return { list: sortedList, total: totalChartExpense, conicString };
      }, [chartTxs, totalFixed, sourceFilter]);

      // ★ 趨勢折線圖數據 ★
      const trendData = useMemo(() => {
        const now = new Date();
        const months = [];
        for (let i = 5; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const key = getMonthKey(d);
          const label = `${d.getMonth() + 1}月`;
          const monthTx = data.transactions.filter(t => getMonthKey(t.date) === key);
          const inc = monthTx.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
          const exp = monthTx.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
          months.push({ key, label, income: inc, expense: exp });
        }
        const maxVal = Math.max(...months.map(m => Math.max(m.income, m.expense)), 1);
        return { months, maxVal };
      }, [data.transactions]);

      // ★ 搜尋/篩選後的交易 ★
      const searchedTxs = useMemo(() => {
        let list = filteredTxs;
        if (searchQuery.trim()) {
          const q = searchQuery.trim().toLowerCase();
          list = list.filter(t => 
            (t.note && t.note.toLowerCase().includes(q)) || 
            t.category.toLowerCase().includes(q) ||
            (t.tags && t.tags.some(tag => tag.toLowerCase().includes(q)))
          );
        }
        if (categoryFilter !== "all") {
          list = list.filter(t => t.category === categoryFilter);
        }
        if (tagFilter !== "all") {
          list = list.filter(t => t.tags && t.tags.includes(tagFilter));
        }
        return list.sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [filteredTxs, searchQuery, categoryFilter, tagFilter]);

      // ★ 範本快速記帳 ★
      const applyTemplate = (tpl) => {
        const tx = { id: generateId(), type: tpl.type, amount: tpl.amount, accountId: tpl.accountId, category: tpl.category, note: tpl.note || "", tags: tpl.tags || [], date: new Date().toISOString().split("T")[0] };
        save({ transactions: [...data.transactions, tx] });
      };
      const saveAsTemplate = () => {
        if (!form.amount || !form.accountId) return;
        const tpl = { id: generateId(), type: form.type, amount: parseFloat(form.amount), accountId: form.accountId, category: form.category || "其他", note: form.note || "", tags: form.tags || [] };
        save({ templates: [...data.templates, tpl] });
      };
      const deleteTemplate = (id) => { save({ templates: data.templates.filter(t => t.id !== id) }); };

      // ★ 標籤管理 ★
      const addTag = (tag) => {
        if (tag && !data.allTags.includes(tag)) save({ allTags: [...data.allTags, tag] });
      };
      const toggleFormTag = (tag) => {
        const tags = form.tags || [];
        setForm(f => ({ ...f, tags: tags.includes(tag) ? tags.filter(t => t !== tag) : [...tags, tag] }));
      };

      // ★ 修正滑動方向邏輯 ★
      const handleTouchStart = (e) => { 
        touchStartX.current = e.targetTouches[0].clientX; 
        touchStartY.current = e.targetTouches[0].clientY; 
      };
      
      const handleTouchMove = (e) => { 
        touchEndX.current = e.targetTouches[0].clientX; 
        touchEndY.current = e.targetTouches[0].clientY; 
      };
      
      const handleTouchEnd = () => {
        if (touchStartX.current === null || touchEndX.current === null) return;
        const distanceX = touchStartX.current - touchEndX.current;
        const distanceY = touchStartY.current - touchEndY.current;
        
        if (Math.abs(distanceX) > Math.abs(distanceY) && Math.abs(distanceX) > 30) {
          if (distanceX < 0 && touchStartX.current < 40) {
            setIsMenuOpen(true);
          } else if (distanceX > 0 && isMenuOpen) {
            setIsMenuOpen(false);
          } else if (!isMenuOpen && !modal) {
            // ★ 右滑返回上一頁 ★
            if (distanceX < 0 && backMap[tab]) {
              navigateTo(backMap[tab], "left");
            }
            // ★ overview 子分頁左右滑切換 ★
            else if (overviewTabs.includes(tab)) {
              const idx = overviewTabs.indexOf(tab);
              if (distanceX > 0 && idx < overviewTabs.length - 1) {
                navigateTo(overviewTabs[idx + 1], "right");
              } else if (distanceX < 0 && idx > 0) {
                navigateTo(overviewTabs[idx - 1], "left");
              }
            }
          }
        }
        
        touchStartX.current = null; 
        touchStartY.current = null; 
        touchEndX.current = null; 
        touchEndY.current = null;
      };

      const exportCSV = () => {
        const rows = [["日期", "類型", "來源(帳戶/卡片)", "分類", "標籤", "備注", "金額(NT$)"]];
        [...data.transactions].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach((tx) => {
          let sourceName = "";
          const acc = data.accounts.find(a => a.id === tx.accountId);
          const card = data.creditCards.find(c => c.id === tx.accountId);
          if (acc) sourceName = acc.name;
          else if (card) sourceName = card.name;
          rows.push([tx.date, tx.type === "income" ? "收入" : "支出", sourceName, tx.category, (tx.tags || []).join(";"), tx.note, tx.type === "income" ? tx.amount : -tx.amount]);
        });
        const csvContent = rows.map((r) => r.map((c) => `"${c}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `財庫_明細_${new Date().toISOString().split("T")[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const addTransaction = () => {
        if (!form.amount || !form.accountId || !form.type) return;
        if (editTx) {
          save({ transactions: data.transactions.map((t) => t.id === editTx.id ? { ...t, type: form.type, amount: parseFloat(form.amount), accountId: form.accountId, category: form.category || "其他", note: form.note || "", tags: form.tags || [], date: form.date || new Date().toISOString().split("T")[0] } : t) });
        } else {
          const tx = { id: generateId(), type: form.type, amount: parseFloat(form.amount), accountId: form.accountId, category: form.category || "其他", note: form.note || "", tags: form.tags || [], date: form.date || new Date().toISOString().split("T")[0] };
          save({ transactions: [...data.transactions, tx] });
        }
        setModal(null); setForm({}); setEditTx(null);
      };

      const addAccountOrCard = (isCard) => {
        if (!form.name) return;
        const targetList = isCard ? 'creditCards' : 'accounts';
        const finalIcon = form.icon ? form.icon.trim() : (isCard ? "💳" : "💼");
        
        if (editAccount || editCard) {
          const editId = isCard ? editCard.id : editAccount.id;
          save({ [targetList]: data[targetList].map((a) => a.id === editId ? { ...a, name: form.name, icon: finalIcon, color: form.color || a.color, limit: isCard ? parseFloat(form.limit) : undefined } : a) });
        } else {
          const newItem = { id: generateId(), name: form.name, icon: finalIcon, color: form.color || "#0a84ff", balance: 0 };
          if (isCard) newItem.limit = parseFloat(form.limit) || 20000;
          save({ [targetList]: [...data[targetList], newItem] });
        }
        setModal(null); setForm({}); setEditAccount(null); setEditCard(null);
      };

      const deleteItem = (id, listName) => {
        if(listName === 'transactions') save({ transactions: data.transactions.filter(t => t.id !== id) });
        else if(listName === 'accounts' || listName === 'creditCards') {
           save({ [listName]: data[listName].filter(a => a.id !== id), transactions: data.transactions.filter(t => t.accountId !== id) });
        }
        else if(listName === 'fixed') save({ fixedExpenses: data.fixedExpenses.filter(f => f.id !== id) });
      };

      if (showSplash) {
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0f0f14", display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center", zIndex: 9999,
            opacity: splashFading ? 0 : 1, transform: splashFading ? "scale(1.08)" : "scale(1)",
            transition: "opacity 0.6s cubic-bezier(0.32, 0.72, 0, 1), transform 0.6s cubic-bezier(0.32, 0.72, 0, 1)"
          }}>
            <div style={{ position: "relative", marginBottom: 32 }}>
              <div className="splash-ring" style={{
                width: 110, height: 110, borderRadius: "50%",
                background: "conic-gradient(from 0deg, #7c6fcd, #c4b5fd, #5e5ce6, #a78bfa, #7c6fcd)",
                display: "flex", alignItems: "center", justifyContent: "center",
                animation: "splashSpin 2s linear infinite"
              }}>
                <div style={{
                  width: 96, height: 96, borderRadius: "50%", background: "#0f0f14",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 44
                }}>💰</div>
              </div>
              <div style={{
                position: "absolute", inset: -8, borderRadius: "50%",
                background: "radial-gradient(circle, rgba(124,111,205,0.25) 0%, transparent 70%)",
                animation: "splashPulse 1.6s ease-in-out infinite", zIndex: -1
              }}></div>
            </div>
            <div style={{
              fontSize: 36, color: "#fff",
              letterSpacing: 2, opacity: 0, animation: "splashTextIn 0.8s 0.3s forwards"
            }}>財庫</div>
            <div style={{
              fontSize: 13, color: "rgba(255,255,255,0.35)", marginTop: 8, fontWeight: 500,
              letterSpacing: 4, opacity: 0, animation: "splashTextIn 0.8s 0.6s forwards"
            }}>FINANCE VAULT</div>
            <div style={{
              marginTop: 48, width: 32, height: 3, borderRadius: 2, background: "#7c6fcd",
              opacity: 0, animation: "splashBarIn 1.2s 0.9s forwards"
            }}></div>
            <style>{`
              @keyframes splashSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
              @keyframes splashPulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.15); opacity: 0.8; } }
              @keyframes splashTextIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
              @keyframes splashBarIn { 0% { opacity: 0; width: 0; } 50% { opacity: 1; } 100% { opacity: 0.6; width: 80px; } }
            `}</style>
          </div>
        );
      }

      if (!isUnlocked) {
        const handlePin = (n) => {
          const newPin = inputPin + n;
          setInputPin(newPin);
          if (newPin.length === 4) {
            if (newPin === data.settings.passcode) setIsUnlocked(true);
            else { setInputPin(""); alert("密碼錯誤"); }
          }
        };
        return (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: "#0f0f14", color: "#fff" }}>
            <div style={{ fontSize: 40, marginBottom: 20 }}>🔒</div>
            <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 40 }}>請輸入密碼解鎖財庫</div>
            <div style={{ display: "flex", gap: 16, marginBottom: 60 }}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{ width: 16, height: 16, borderRadius: "50%", border: "2px solid #fff", background: inputPin.length > i ? "#fff" : "transparent", transition: "all 0.2s" }} />
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 24 }}>
              {[1,2,3,4,5,6,7,8,9,"",0,"刪除"].map((n, i) => (
                <button key={i} style={{ width: 72, height: 72, borderRadius: "50%", background: n !== "" && n !== "刪除" ? "rgba(255,255,255,0.1)" : "transparent", border: "none", color: "#fff", fontSize: 24, fontWeight: 600, visibility: n === "" ? "hidden" : "visible" }} 
                  onClick={() => n === "刪除" ? setInputPin(inputPin.slice(0,-1)) : handlePin(n)}>
                  {n === "刪除" ? "⌫" : n}
                </button>
              ))}
            </div>
          </div>
        );
      }

                {(!data.templates || data.templates.length === 0) ? (

                if (k === "=") return { ...f, amount: hasOp(cur) ? calcResult(cur) : cur };
                if (ops.includes(k)) {
                  const last = cur[cur.length - 1];
                  if (ops.includes(last)) return { ...f, amount: cur.slice(0, -1) + k };
                  return { ...f, amount: cur + k };
                }
                if (k === ".") {
                  const parts = cur.split(/[+\-×÷]/);
                  if (parts[parts.length - 1].includes(".")) return f;
                  return { ...f, amount: cur + "." };

                if (cur === "0") cur = "";

                      {k:"4"},{k:"5"},{k:"6"},{k:"×",type:"op"},{k:"AC",type:"func"},
                      {k:"7"},{k:"8"},{k:"9"},{k:"+",type:"op"},{k:"OK",type:"ok",span:2},

                      <button key={i}

                          if (btn.type === "ok") {

                            if (["+","-","×","÷"].some(o => cur.includes(o))) {
                              const expr = cur.replace(/×/g,"*").replace(/÷/g,"/");

                            }
                            setTimeout(() => addTransaction(), 50);

                          else { pressKey(btn.fn || btn.k); }
                        }}
                        style={{
                          height: 50, borderRadius: btn.type === "ok" ? 16 : 26, border: "none", cursor: "pointer",

                      >{btn.k}</button>

                  </div>

            </div>

                      <input className="input-field" style={{ border: "none", padding: "4px 8px", fontSize: 12, color: "#888", background: "transparent" }} type="text" placeholder="點此輸入 Emoji 圖示" value={form.icon || ""} onChange={(e) => setForm((f) => ({ ...f, icon: e.target.value }))} />

                  <div>

                    <div style={{ display: "flex", gap: 12, justifyContent: "space-between" }}>
                      {CHART_COLORS.slice(0, 6).map((c) => (
                        <button key={c} onClick={() => setForm((f) => ({ ...f, color: c }))} style={{ width: 36, height: 36, borderRadius: "50%", background: c, border: form.color === c ? "3px solid white" : "3px solid transparent" }} />

                <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 16 }}>設定 4 位數密碼</div>
                <input className="input-field" style={{ fontSize: 24, textAlign: "center", letterSpacing: 10, width: 200, margin: "0 auto" }} type="password" maxLength="4" placeholder="----" value={form.passcode || ""} onChange={(e) => setForm({passcode: e.target.value})} />
                <button className="btn-primary" style={{ width: "100%", marginTop: 24, padding: "16px" }} onClick={() => { if(form.passcode && form.passcode.length === 4) { save({ settings: { ...data.settings, passcode: form.passcode } }); setModal(null); setForm({}); } else alert("請輸入 4 位數字"); }}>確認設定</button>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FinanceTracker />);
  </script>
</body>
</html>
